<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Jay & 桃桃 · 喂食日记</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            max-width: 550px;
            margin: 30px auto;
            padding: 25px;
            background: linear-gradient(135deg, #f7f9f2 0%, #e8f0d5 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 { text-align: center; color: #6b8f3a; font-size: 24px; margin: 0 0 20px 0; }

        /* 照片墙 */
        .photo-row { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .bird-box { text-align: center; }
        .bird-box .name { color: #6b8f3a; font-weight: bold; margin-bottom: 5px; }
        .photo-circle {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px dashed #c5d8a4; margin: 0 auto;
            overflow: hidden; background: #fdfdfb;
            display: flex; align-items: center; justify-content: center;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .photo-btn {
            margin-top: 5px; background: #7a9f43; color: white;
            border: none; padding: 5px 12px; border-radius: 15px;
            cursor: pointer; font-size: 12px;
        }
        .delete-photo-btn {
            margin-top: 3px; background: white; color: #ccc;
            border: 1px solid #eee; padding: 3px 10px; border-radius: 10px;
            cursor: pointer; font-size: 10px;
        }

        /* 日记 */
        .diary-entry {
            background: white; padding: 16px 20px; margin: 12px 0;
            border-radius: 12px; border-left: 5px solid #a3c969;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .diary-entry strong { color: #4a7c2e; font-size: 13px; display: block; margin-bottom: 6px; }
        textarea {
            width: 100%; height: 90px; margin: 12px 0; border-radius: 12px;
            border: 2px solid #c5d8a4; padding: 14px; font-size: 15px;
            resize: vertical; box-sizing: border-box; font-family: inherit;
            background: #fdfdfb;
        }
        textarea:focus { outline: none; border-color: #6b8f3a; }
        button {
            background: #7a9f43; color: white; border: none;
            padding: 12px 24px; border-radius: 25px; cursor: pointer;
            font-size: 15px; font-weight: bold; margin: 5px 8px 5px 0;
        }
        button:hover { background: #5c7a2e; }
        .placeholder-text { color: #c5d8a4; font-size: 12px; }
    </style>
</head>
<body>
    <!-- ========== 照片墙 ========== -->
    <div class="photo-row">
        <!-- Jay Jay -->
        <div class="bird-box">
            <div class="name">🐦 Jay Jay</div>
            <div class="photo-circle" id="jayjayPhoto">
                <span class="placeholder-text">Jay Jay</span>
            </div>
            <input type="file" id="jayjayFile" accept="image/*" style="display:none;" onchange="uploadBirdPhoto('jayjay')">
            <button class="photo-btn" onclick="document.getElementById('jayjayFile').click()">📷</button>
            <br>
            <button class="delete-photo-btn" onclick="deleteBirdPhoto('jayjay')">🗑️</button>
        </div>

        <!-- 桃桃 -->
        <div class="bird-box">
            <div class="name">🐦 桃桃</div>
            <div class="photo-circle" id="taotaoPhoto">
                <span class="placeholder-text">桃桃</span>
            </div>
            <input type="file" id="taotaoFile" accept="image/*" style="display:none;" onchange="uploadBirdPhoto('taotao')">
            <button class="photo-btn" onclick="document.getElementById('taotaoFile').click()">📷</button>
            <br>
            <button class="delete-photo-btn" onclick="deleteBirdPhoto('taotao')">🗑️</button>
        </div>
    </div>

    <!-- ========== 日记区域 ========== -->
    <!-- ========== 日历 ========== -->
<div style="background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <button onclick="changeMonth(-1)" style="background: none; border: none; color: #6b8f3a; font-size: 18px; cursor: pointer; padding: 5px 10px;">◀</button>
        <span id="currentMonth" style="color: #6b8f3a; font-weight: bold; font-size: 16px;"></span>
        <button onclick="changeMonth(1)" style="background: none; border: none; color: #6b8f3a; font-size: 18px; cursor: pointer; padding: 5px 10px;">▶</button>
    </div>
    <div id="calendar" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; font-size: 13px;"></div>
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; font-size: 11px; color: #999; margin-bottom: 5px;">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
    </div>
</div>

<!-- ========== 搜索框 ========== -->
<div style="margin-bottom: 15px;">
    <input type="text" id="searchInput" placeholder="🔍 搜索日记..."
           style="width: 100%; padding: 10px 15px; border-radius: 20px; border: 2px solid #c5d8a4; font-size: 14px; box-sizing: border-box;"
           oninput="searchDiary()">
</div>

<h1>📝 喂食日记</h1>
    <div id="entries"></div>
    <textarea id="newEntry" placeholder="今天喂了什么好吃的？..."></textarea>
    <br>
    <button onclick="addEntry()">📝 记下来</button>
    <button onclick="clearDiary()">🗑️ 清空日记</button>

    <!-- ========== Firebase ========== -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ_myzq62wP3_xjy7V0tn_N04soA-Nkk0",
            authDomain: "jjtt-9c2de.firebaseapp.com",
            projectId: "jjtt-9c2de",
            storageBucket: "jjtt-9c2de.firebasestorage.app",
            messagingSenderId: "718171268915",
            appId: "1:718171268915:web:a9c1bf3fd63480920f0046",
            measurementId: "G-KDRMVDWFSN"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ========== 日记功能 ==========
        function displayDiary(keyword) {
    let container = document.getElementById('entries');
    container.innerHTML = '';

    let query = db.collection('entries').orderBy('createdAt', 'desc');

    if (keyword && keyword.trim() !== '') {
        // 用 Firestore 的 where 做简单搜索（搜不到包含关键词的，只能精确匹配）
        // 所以我们改成先全部取出来，再在前端过滤
    }

    query.get()
      .then((querySnapshot) => {
        let allDocs = [];
        querySnapshot.forEach((doc) => {
            allDocs.push({ id: doc.id, data: doc.data() });
        });

        // 如果有搜索关键词，过滤
        if (keyword && keyword.trim() !== '') {
            let kw = keyword.trim().toLowerCase();
            allDocs = allDocs.filter(doc => doc.data.content.toLowerCase().includes(kw));
        }

        // 记录哪些日期有日记，给日历用
        window.diaryDates = new Set();
        allDocs.forEach(doc => {
            if (doc.data.createdAt) {
                let date = doc.data.createdAt.toDate();
                let dateStr = date.getFullYear() + '-' +
                              String(date.getMonth() + 1).padStart(2, '0') + '-' +
                              String(date.getDate()).padStart(2, '0');
                window.diaryDates.add(dateStr);
            }
        });
        renderCalendar(); // 更新日历标记

        // 显示日记
        allDocs.forEach(doc => {
            let data = doc.data;
            let entryDiv = document.createElement('div');
            entryDiv.className = 'diary-entry';
            entryDiv.innerHTML = `
                <strong>${data.time}</strong>
                <span style="float: right; cursor: pointer; color: #ccc; font-size: 18px;"
                      onclick="deleteEntry('${doc.id}')">🗑️</span>
                <br>${data.content}
            `;
            container.appendChild(entryDiv);
        });

        if (allDocs.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#999;">没有找到日记</p>';
        }
      }).catch((error) => {
        container.innerHTML = '加载失败了：' + error.message;
      });
}
       function searchDiary() {
    let keyword = document.getElementById('searchInput').value;
    displayDiary(keyword);
}

// 当前显示的年月
let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth() + 1;

function renderCalendar() {
    let container = document.getElementById('calendar');
    let monthSpan = document.getElementById('currentMonth');

    monthSpan.innerText = calendarYear + '年 ' + calendarMonth + '月';

    let firstDay = new Date(calendarYear, calendarMonth - 1, 1).getDay(); // 本月第一天是星期几
    let daysInMonth = new Date(calendarYear, calendarMonth, 0).getDate(); // 本月有多少天

    let html = '';

    // 填充前面的空白
    for (let i = 0; i < firstDay; i++) {
        html += '<div></div>';
    }

    // 填充日期
    for (let day = 1; day <= daysInMonth; day++) {
        let dateStr = calendarYear + '-' +
                      String(calendarMonth).padStart(2, '0') + '-' +
                      String(day).padStart(2, '0');
        let hasDiary = window.diaryDates && window.diaryDates.has(dateStr);
        let style = hasDiary ?
                    'background: #7a9f43; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto;' :
                    '';
        html += '<div style="' + style + '">' + day + '</div>';
    }

    container.innerHTML = html;
}

function changeMonth(delta) {
    calendarMonth += delta;
    if (calendarMonth > 12) {
        calendarMonth = 1;
        calendarYear++;
    }
    if (calendarMonth < 1) {
        calendarMonth = 12;
        calendarYear--;
    }
    // 重新加载日记，日历会自动更新
    let keyword = document.getElementById('searchInput').value;
    displayDiary(keyword);
}

        function addEntry() {
            let text = document.getElementById('newEntry').value;
            if (text.trim() === '') { alert('铁子，写点啥呗！'); return; }
            let now = new Date();
            let timeStr = now.toLocaleString('zh-CN');
            db.collection('entries').add({
                content: text,
                time: timeStr,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                displayDiary();
                document.getElementById('newEntry').value = '';
            }).catch((error) => { alert('存失败了：' + error.message); });
        }

        function deleteEntry(docId) {
            if (confirm('确定要删除这条日记吗？')) {
                db.collection('entries').doc(docId).delete()
                  .then(() => { displayDiary(); })
                  .catch((error) => { alert('删除失败：' + error.message); });
            }
        }

        function clearDiary() {
            if (confirm('铁子，确定要把所有日记都删掉吗？')) {
                db.collection('entries').get().then((querySnapshot) => {
                    let batch = db.batch();
                    querySnapshot.forEach((doc) => { batch.delete(doc.ref); });
                    return batch.commit();
                }).then(() => { displayDiary(); })
                  .catch((error) => { alert('删除失败：' + error.message); });
            }
        }

        // ========== 照片功能 ==========
        function uploadBirdPhoto(bird) {
    let fileInput = document.getElementById(bird + 'File');
    let file = fileInput.files[0];
    if (!file) {
        alert('请先选一张照片');
        return;
    }

    // 用 canvas 压缩照片
    let reader = new FileReader();
    reader.onload = function(e) {
        let img = new Image();
        img.onload = function() {
            // 创建 canvas，把图片缩小
            let canvas = document.createElement('canvas');
            let maxSize = 400; // 最大宽度或高度 400px
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > maxSize) {
                    height = height * (maxSize / width);
                    width = maxSize;
                }
            } else {
                if (height > maxSize) {
                    width = width * (maxSize / height);
                    height = maxSize;
                }
            }

            canvas.width = width;
            canvas.height = height;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 压缩成 JPEG，质量 0.6（越小越压）
            let base64 = canvas.toDataURL('image/jpeg', 0.6);

            // 存到 Firestore
            db.collection('birdPhotos').add({
                bird: bird,
                photoData: base64,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                loadBirdPhoto(bird);
            }).catch((error) => {
                alert('上传失败：' + error.message);
            });
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

        function loadBirdPhoto(bird) {
            let container = document.getElementById(bird + 'Photo');
            db.collection('birdPhotos')
              .where('bird', '==', bird)
              .orderBy('createdAt', 'desc')
              .limit(1)
              .get()
              .then((querySnapshot) => {
                if (querySnapshot.empty) {
                    container.innerHTML = '<span class="placeholder-text">' + (bird === 'jayjay' ? 'Jay Jay' : '桃桃') + '</span>';
                } else {
                    querySnapshot.forEach((doc) => {
                        let data = doc.data();
                        container.innerHTML = '<img src="' + data.photoData + '" style="width:100%;height:100%;object-fit:cover;">';
                    });
                }
              }).catch((error) => { container.innerHTML = '<span style="color:red;">加载失败</span>'; });
        }

        function deleteBirdPhoto(bird) {
            if (confirm('确定要删除' + (bird === 'jayjay' ? 'Jay Jay' : '桃桃') + '的照片吗？')) {
                db.collection('birdPhotos').where('bird', '==', bird).get()
                  .then((querySnapshot) => {
                    let batch = db.batch();
                    querySnapshot.forEach((doc) => { batch.delete(doc.ref); });
                    return batch.commit();
                  }).then(() => { loadBirdPhoto(bird); })
                  .catch((error) => { alert('删除失败：' + error.message); });
            }
        }

        // ========== 页面加载 ==========
        calendarYear = new Date().getFullYear();
        calendarMonth = new Date().getMonth() + 1;
        displayDiary();
        loadBirdPhoto('jayjay');
        loadBirdPhoto('taotao');
        displayDiary();
        loadBirdPhoto('jayjay');
        loadBirdPhoto('taotao');
    </script>
</body>
</html>
