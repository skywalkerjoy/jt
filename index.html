<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Jay & 桃桃 · 喂食日记</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fef9e7;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #d4a373; }
        .diary-entry {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 5px solid #faedcd;
        }
        button {
            background-color: #d4a373;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background-color: #bc6c25; }
        textarea { width: 100%; height: 80px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
    <h1>🐦 Jay Jay & 桃桃 · 喂食日记</h1>
    <div id="entries"></div>
    <textarea id="newEntry" placeholder="今天喂了什么好吃的？..."></textarea>
    <br>
    <button onclick="addEntry()">📝 记下来</button>
    <button onclick="clearDiary()">🗑️ 清空日记</button>
    <!-- 加载 Firebase 库 -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // ========== 初始化 Firebase ==========
  const firebaseConfig = {
    apiKey: "AIzaSyDQ_myzq62wP3_xjy7V0tn_N04soA-Nkk0",
    authDomain: "jjtt-9c2de.firebaseapp.com",
    projectId: "jjtt-9c2de",
    storageBucket: "jjtt-9c2de.firebasestorage.app",
    messagingSenderId: "718171268915",
    appId: "1:718171268915:web:a9c1bf3fd63480920f0046",
    measurementId: "G-KDRMVDWFSN"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ========== 添加日记 ==========
  function addEntry() {
    let text = document.getElementById('newEntry').value;
    if (text.trim() === '') {
      alert('铁子，写点啥呗！');
      return;
    }

    let now = new Date();
    let timeStr = now.toLocaleString('zh-CN');

    db.collection('entries').add({
      content: text,
      time: timeStr,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      displayDiary();
      document.getElementById('newEntry').value = '';
    }).catch((error) => {
      alert('存失败了：' + error.message);
    });
  }

  // ========== 显示日记 ==========
  function displayDiary() {
    let container = document.getElementById('entries');
    container.innerHTML = '';

    db.collection('entries')
      .orderBy('createdAt', 'desc')
      .get()
      .then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
          let data = doc.data();
          let entryDiv = document.createElement('div');
          entryDiv.className = 'diary-entry';
          entryDiv.innerHTML = `<strong>${data.time}</strong><br>${data.content}`;
          container.appendChild(entryDiv);
        });
      }).catch((error) => {
        container.innerHTML = '加载失败了：' + error.message;
      });
  }

  // ========== 清空日记 ==========
  function clearDiary() {
    if (confirm('铁子，确定要把所有日记都删掉吗？')) {
      db.collection('entries').get().then((querySnapshot) => {
        let batch = db.batch();
        querySnapshot.forEach((doc) => {
          batch.delete(doc.ref);
        });
        return batch.commit();
      }).then(() => {
        displayDiary();
      }).catch((error) => {
        alert('删除失败：' + error.message);
      });
    }
  }

  // ========== 页面加载时显示日记 ==========
  displayDiary();
</script>
    
</body>
</html>
</html>
