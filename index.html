<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Jay & 桃桃 · 喂食日记</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- ========== 左侧：Jay Jay 留言板（固定） ========== -->
<div style="position: fixed; left: 10px; top: 50%; transform: translateY(-50%); width: 200px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; text-align: center;">
    <h3 style="color: #6b8f3a; font-size: 16px; margin: 0 0 10px 0;">🐦 Jay Jay</h3>
    <textarea id="jayjayNote" placeholder="Note for Jay Jay..."
              style="width: 100%; height: 50px; padding: 8px; border-radius: 8px; border: 2px solid #c5d8a4; font-size: 12px; margin-bottom: 6px; box-sizing: border-box; resize: vertical;"></textarea>
    <button onclick="addBirdNote('jayjay')" style="background: #7a9f43; color: white; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 11px; width: 100%;">🐦 Leave Note</button>
    <div id="jayjayNotes" style="margin-top: 10px; max-height: 300px; overflow-y: auto; text-align: left;"></div>
</div>

<!-- ========== 右侧：桃桃留言板（固定） ========== -->
<div style="position: fixed; right: 10px; top: 50%; transform: translateY(-50%); width: 200px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; text-align: center;">
    <h3 style="color: #6b8f3a; font-size: 16px; margin: 0 0 10px 0;">🐦 Tao Tao</h3>
    <textarea id="taotaoNote" placeholder="Note for Tao Tao..."
              style="width: 100%; height: 50px; padding: 8px; border-radius: 8px; border: 2px solid #c5d8a4; font-size: 12px; margin-bottom: 6px; box-sizing: border-box; resize: vertical;"></textarea>
    <button onclick="addBirdNote('taotao')" style="background: #7a9f43; color: white; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 11px; width: 100%;">🐦 Leave Note</button>
    <div id="taotaoNotes" style="margin-top: 10px; max-height: 300px; overflow-y: auto; text-align: left;"></div>
</div>
    <!-- ========== 照片墙 ========== -->
    <div class="photo-row">
        <!-- Jay Jay -->
        <div class="bird-box">
            <div class="name">🐦 Jay Jay</div>
            <div class="photo-circle" id="jayjayPhoto">
                <span class="placeholder-text">Jay Jay</span>
            </div>
            <input type="file" id="jayjayFile" accept="image/*" style="display:none;" onchange="uploadBirdPhoto('jayjay')">
            <button class="photo-btn" onclick="document.getElementById('jayjayFile').click()">📷</button>
            <br>
            <button class="delete-photo-btn" onclick="deleteBirdPhoto('jayjay')">🗑️</button>
        </div>

        <!-- 桃桃 -->
        <div class="bird-box">
            <div class="name">🐦 桃桃</div>
            <div class="photo-circle" id="taotaoPhoto">
                <span class="placeholder-text">桃桃</span>
            </div>
            <input type="file" id="taotaoFile" accept="image/*" style="display:none;" onchange="uploadBirdPhoto('taotao')">
            <button class="photo-btn" onclick="document.getElementById('taotaoFile').click()">📷</button>
            <br>
            <button class="delete-photo-btn" onclick="deleteBirdPhoto('taotao')">🗑️</button>
        </div>
    </div>

    <!-- ========== 日记区域 ========== -->
    <!-- ========== 日历 ========== -->
<div style="background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <button onclick="changeMonth(-1)" style="background: none; border: none; color: #6b8f3a; font-size: 18px; cursor: pointer; padding: 5px 10px;">◀</button>
        <span id="currentMonth" style="color: #6b8f3a; font-weight: bold; font-size: 16px;"></span>
        <button onclick="changeMonth(1)" style="background: none; border: none; color: #6b8f3a; font-size: 18px; cursor: pointer; padding: 5px 10px;">▶</button>
    </div>
    <div id="calendar" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; font-size: 13px;"></div>
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; font-size: 11px; color: #999; margin-bottom: 5px;">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
    </div>
</div>

<!-- ========== 搜索框 ========== -->
<div style="margin-bottom: 15px;">
    <input type="text" id="searchInput" placeholder="🔍 搜索日记..."
           style="width: 100%; padding: 10px 15px; border-radius: 20px; border: 2px solid #c5d8a4; font-size: 14px; box-sizing: border-box;"
           oninput="searchDiary()">
</div>

<h1>📝 喂食日记</h1>
    <div id="entries"></div>
    <textarea id="newEntry" placeholder="今天喂了什么好吃的？..."></textarea>
    <br>
    <button onclick="addEntry()">📝 记下来</button>
    <button onclick="clearDiary()">🗑️ 清空日记</button>

    <!-- ========== Firebase ========== -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>

</body>
</html>
