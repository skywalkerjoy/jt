<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Jay & 桃桃 · 喂食日记</title>
    <style>
       body {
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        max-width: 550px;
        margin: 30px auto;
        padding: 25px;
        background: linear-gradient(135deg, #fef9e7 0%, #fef3c7 100%);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
        text-align: center;
        color: #d4a373;
        font-size: 24px;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .diary-entry {
        background: white;
        padding: 16px 20px;
        margin: 12px 0;
        border-radius: 12px;
        border-left: 5px solid #faedcd;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        transition: transform 0.2s;
    }

    .diary-entry:hover {
        transform: translateX(3px);
        border-left-color: #d4a373;
    }

    .diary-entry strong {
        color: #bc6c25;
        font-size: 13px;
        display: block;
        margin-bottom: 6px;
    }

    textarea {
        width: 100%;
        height: 90px;
        margin: 12px 0;
        border-radius: 12px;
        border: 2px solid #faedcd;
        padding: 14px;
        font-size: 15px;
        resize: vertical;
        box-sizing: border-box;
        font-family: inherit;
        transition: border-color 0.3s;
    }

    textarea:focus {
        outline: none;
        border-color: #d4a373;
    }

    button {
        background: #d4a373;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 15px;
        font-weight: bold;
        margin: 5px 8px 5px 0;
        transition: all 0.3s;
        box-shadow: 0 4px 12px rgba(212, 163, 115, 0.3);
    }

    button:hover {
        background: #bc6c25;
        box-shadow: 0 6px 18px rgba(188, 108, 37, 0.35);
        transform: translateY(-1px);
    }

    button:active {
        transform: translateY(0);
    }

    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
    }

    .time-badge {
        color: #bc6c25;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .content-text {
        color: #555;
        line-height: 1.6;
    }
    </style>
</head>
<body>
    <h1>🐦 Jay Jay & 桃桃 · 喂食日记</h1>
    <div id="entries"></div>
    <textarea id="newEntry" placeholder="今天喂了什么好吃的？..."></textarea>
    <br>
    <button onclick="addEntry()">📝 记下来</button>
    <button onclick="clearDiary()">🗑️ 清空日记</button>
    <!-- 加载 Firebase 库 -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // ========== 初始化 Firebase ==========
  const firebaseConfig = {
    apiKey: "AIzaSyDQ_myzq62wP3_xjy7V0tn_N04soA-Nkk0",
    authDomain: "jjtt-9c2de.firebaseapp.com",
    projectId: "jjtt-9c2de",
    storageBucket: "jjtt-9c2de.firebasestorage.app",
    messagingSenderId: "718171268915",
    appId: "1:718171268915:web:a9c1bf3fd63480920f0046",
    measurementId: "G-KDRMVDWFSN"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ========== 添加日记 ==========
  function addEntry() {
    let text = document.getElementById('newEntry').value;
    if (text.trim() === '') {
      alert('铁子，写点啥呗！');
      return;
    }

    let now = new Date();
    let timeStr = now.toLocaleString('zh-CN');

    db.collection('entries').add({
      content: text,
      time: timeStr,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      displayDiary();
      document.getElementById('newEntry').value = '';
    }).catch((error) => {
      alert('存失败了：' + error.message);
    });
  }

  // ========== 显示日记 ==========
  function displayDiary() {
    let container = document.getElementById('entries');
    container.innerHTML = '';

    db.collection('entries')
      .orderBy('createdAt', 'desc')
      .get()
      .then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
          let data = doc.data();
          let entryDiv = document.createElement('div');
          entryDiv.className = 'diary-entry';
          entryDiv.innerHTML = `<strong>${data.time}</strong><br>${data.content}`;
          container.appendChild(entryDiv);
        });
      }).catch((error) => {
        container.innerHTML = '加载失败了：' + error.message;
      });
  }

  // ========== 清空日记 ==========
  function clearDiary() {
    if (confirm('铁子，确定要把所有日记都删掉吗？')) {
      db.collection('entries').get().then((querySnapshot) => {
        let batch = db.batch();
        querySnapshot.forEach((doc) => {
          batch.delete(doc.ref);
        });
        return batch.commit();
      }).then(() => {
        displayDiary();
      }).catch((error) => {
        alert('删除失败：' + error.message);
      });
    }
  }

  // ========== 页面加载时显示日记 ==========
  displayDiary();
</script>
    
</body>
</html>
</html>
